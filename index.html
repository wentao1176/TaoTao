<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生日快乐 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            overflow: hidden;
            flex-direction: column;
            color: white;
        }

        /* 烟花动画容器 */
        #fireworks {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 50px 60px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            max-width: 600px;
            animation: fadeIn 1.5s ease;
            position: relative;
            z-index: 2;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
        }

        /* 替换为文字蛋糕 */
        .cake {
            font-size: 80px;
            margin: 20px 0;
            animation: bounce 1.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .wish {
            font-size: 24px;
            margin: 20px 0;
            min-height: 36px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .tips {
            margin-top: 30px;
            font-size: 16px;
            opacity: 0.9;
        }

        /* 点击特效粒子 */
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            pointer-events: none;
            animation: explode 1s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- 烟花背景容器 -->
    <div id="fireworks"></div>

    <div class="card">
        <h1 class="title">生日快乐 🎉</h1>
        
        <!-- 文字蛋糕图标 -->
        <div class="cake">🎂</div>
        
        <div id="wish" class="wish"></div>

        <div class="tips">点击屏幕看看效果！✨</div>
    </div>

    <script>
        // 祝福语列表
        const wishes = [
            "愿你岁岁平安，万事顺遂",
            "愿你眼里有光，心中有梦",
            "愿你被世界温柔以待",
            "愿你每一天都开心快乐",
            "新的一岁，更加闪闪发光！"
        ];

        let index = 0;
        const wishEl = document.getElementById("wish");

        // 自动切换文字
        function changeWish() {
            wishEl.textContent = wishes[index];
            index = (index + 1) % wishes.length;
        }
        
        changeWish();
        setInterval(changeWish, 3000);

        // --------------- 烟花动画逻辑 ---------------
        const fireworksContainer = document.getElementById('fireworks');

        // 随机颜色
        function getRandomColor() {
            const colors = ['#ff0', '#f0f', '#0ff', '#ff3300', '#33ff33', '#ff33cc'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // 创建烟花粒子
        function createFirework(x, y) {
            const particleCount = 50; // 粒子数量
            const color = getRandomColor();

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.background = color;
                
                // 随机方向
                const angle = (Math.PI * 2 * Math.random());
                const speed = Math.random() * 5 + 3;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                
                let time = 0;
                const updatePosition = () => {
                    time += 0.05;
                    particle.style.left = (parseFloat(particle.style.left) + vx) + 'px';
                    particle.style.top = (parseFloat(particle.style.top) + vy + time * 0.5) + 'px'; // 重力
                    
                    if (time < 1) {
                        requestAnimationFrame(updatePosition);
                    } else {
                        particle.remove();
                    }
                };
                updatePosition();
                fireworksContainer.appendChild(particle);
            }
        }

        // 全屏随机自动烟花
        function launchRandomFirework() {
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight / 2;
            createFirework(x, y);
        }
        
        // 点击屏幕触发烟花
        document.addEventListener('click', (e) => {
            createFirework(e.clientX, e.clientY);
        });

        // 每隔2秒自动放一次烟花
        setInterval(launchRandomFirework, 2000);

    </script>
</body>
</html>
